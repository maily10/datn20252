# ── PHỦ ĐỊNH ─────────────────────────────────────────────────────────────────
# Nếu đứng NGAY TRƯỚC một cụm (trong cửa sổ vài từ) → đảo cực cụm đó.
# vd "không hoàn thành kế hoạch", "chưa có lãi", "không chia cổ tức".
negation:
  - "không"
  - "chưa"
  - "chẳng"
  - "khó"
  - "thiếu"
  - "mất"
  - "ngừng"
  - "dừng"
  - "hoãn"
