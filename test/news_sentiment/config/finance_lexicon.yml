# finance_lexicon.yml — Từ điển sắc thái TÀI CHÍNH tiếng Việt (Hướng A: hybrid).
#
# Vì Việt Nam CHƯA có từ điển sentiment tài chính chuẩn hoá (kiểu Loughran-McDonald
# cho tiếng Anh), đây là từ điển tự biên soạn, port khái niệm L&M + bổ sung cụm từ
# đặc trưng thị trường chứng khoán VN. Dùng để HIỆU CHỈNH model PhoBERT ở các sắc
# thái tài chính mà model phổ thông chấm sai (vd "chia cổ tức" → model ra neutral).
#
# NGUYÊN TẮC BIÊN SOẠN:
#   - Ưu tiên CỤM TỪ, tránh từ đơn đa nghĩa "tăng"/"giảm" (lợi nhuận giảm = xấu,
#     nợ xấu giảm = tốt → nghĩa ngược). Vì vậy ghép sẵn ngữ cảnh: "lợi nhuận giảm".
#   - Khớp KHÔNG phân biệt hoa thường, nguyên cụm (word-boundary 2 đầu).
#   - "negation" đảo cực của cụm đứng ngay sau nó trong cửa sổ vài từ.
#
# Tham khảo: Loughran & McDonald (2011), J. of Finance.

# ── TÍCH CỰC ─────────────────────────────────────────────────────────────────
positive:
