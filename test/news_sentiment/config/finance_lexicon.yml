  - "dư mua trần"
  - "bứt phá"
  - "khởi sắc"
  - "hồi phục"
  - "phục hồi"
  - "khả quan"
  - "tích cực"
  - "lạc quan"
  - "sôi động"
  - "đảo chiều tăng"
  # Định giá / khuyến nghị
  - "được nâng hạng"
  - "nâng hạng"
  - "nâng dự báo"
  - "nâng khuyến nghị"
  - "khuyến nghị mua"
